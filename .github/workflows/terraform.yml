name: Terraform Infrastructure

# PR to main        → fmt + init + validate + plan (posts plan as PR comment)
# Push/merge to main → init + plan + apply (fresh plan before every apply)
# Manual dispatch    → target a specific environment and action

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      action:
        description: 'Terraform action'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  pull-requests: write   # post plan output as PR comment

env:
  TF_VERSION: '1.10.0'
  AWS_REGION: us-east-1

# Cancel any in-progress run on the same branch to avoid state conflicts
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false   # false = wait, don't cancel — safer for Terraform

jobs:
  # ── Dev ───────────────────────────────────────────────────────────────────
  terraform-dev:
    name: Terraform / Dev
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment: ${{ github.ref == 'refs/heads/main' && 'dev' || '' }}
    defaults:
      run:
        working-directory: envs/dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Format check ──────────────────────────────────────────────────────
      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true   # report but don't block — fix separately

      # ── Init ──────────────────────────────────────────────────────────────
      - name: Terraform Init
        id: init
        run: terraform init

      # ── Validate ──────────────────────────────────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Plan (runs on both PR and main push) ──────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.DEV_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt
        continue-on-error: true   # we post the result to PR even on failure

      # ── Post plan as PR comment ───────────────────────────────────────────
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const fmt  = '${{ steps.fmt.outcome }}';
            const init = '${{ steps.init.outcome }}';
            const val  = '${{ steps.validate.outcome }}';
            const plan = '${{ steps.plan.outcome }}';

            const planText = fs.readFileSync('envs/dev/plan-output.txt', 'utf8');
            const truncated = planText.length > 55000
              ? planText.slice(0, 55000) + '\n\n... output truncated, see full logs in Actions'
              : planText;

            const statusIcon = (outcome) => outcome === 'success' ? '✅' : '❌';

            const body = `## Terraform Plan — Dev

            | Step | Status |
            |---|---|
            | Format | ${statusIcon(fmt)} \`${fmt}\` |
            | Init | ${statusIcon(init)} \`${init}\` |
            | Validate | ${statusIcon(val)} \`${val}\` |
            | Plan | ${statusIcon(plan)} \`${plan}\` |

            <details><summary>Show Plan Output</summary>

            \`\`\`terraform
            ${truncated}
            \`\`\`
            </details>

            *Workflow: \`${{ github.workflow }}\` | Actor: \`${{ github.actor }}\` | Commit: \`${{ github.sha }}\`*`;

            // Delete previous plan comments to keep PR clean
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments.data) {
              if (c.user.login === 'github-actions[bot]' && c.body.includes('Terraform Plan — Dev')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # ── Fail the job if plan failed (blocks PR merge via branch protection) ──
      - name: Check plan status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # ── Apply — only on push to main, after a fresh successful plan ───────
      - name: Terraform Apply
        if: |
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          steps.plan.outcome == 'success'
        run: |
          terraform apply \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.DEV_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -auto-approve \
            -no-color

      # ── Destroy — manual dispatch only ────────────────────────────────────
      - name: Terraform Destroy
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.environment == 'dev' &&
          github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="db_password=${{ secrets.DEV_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.DEV_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -auto-approve \
            -no-color

  # ── QA (manual dispatch only) ─────────────────────────────────────────────
  terraform-qa:
    name: Terraform / QA
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'qa'
    environment: qa
    defaults:
      run:
        working-directory: envs/qa

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="db_password=${{ secrets.QA_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.QA_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' && steps.plan.outcome == 'success'
        run: |
          terraform apply \
            -var="db_password=${{ secrets.QA_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.QA_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -auto-approve \
            -no-color

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="db_password=${{ secrets.QA_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.QA_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -auto-approve \
            -no-color

  # ── Prod (manual dispatch + approval gate) ────────────────────────────────
  terraform-prod:
    name: Terraform / Prod
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'prod'
    environment: prod   # ← protection rules on this environment require approval
    defaults:
      run:
        working-directory: envs/prod

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="db_password=${{ secrets.PROD_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.PROD_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -out=tfplan \
            -no-color

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' && steps.plan.outcome == 'success'
        run: |
          terraform apply \
            -var="db_password=${{ secrets.PROD_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.PROD_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -auto-approve \
            -no-color

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="db_password=${{ secrets.PROD_DB_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.PROD_JWT_SECRET }}" \
            -var="github_org=ravdy" \
            -auto-approve \
            -no-color
